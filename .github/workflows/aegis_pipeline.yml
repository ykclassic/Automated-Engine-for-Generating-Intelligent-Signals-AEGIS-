name: AEGIS Alpha Signal Pipeline

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:      # Allow manual runs

env:
  PYTHON_VERSION: '3.12'
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Dependencies
        run: pip install pandas ccxt pyyaml pyarrow tenacity requests
      - name: Run Data Fetcher
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          python src/core/data_fetcher.py
      - name: Upload Raw Data
        uses: actions/upload-artifact@v4
        with:
          name: raw-ohlcv
          path: data/raw/
          retention-days: 1

  feature-engineering:
    needs: fetch-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Dependencies
        run: pip install pandas numpy pyyaml pyarrow pandas-ta tenacity ccxt requests
      - name: Download Raw Data
        uses: actions/download-artifact@v4
        with:
          name: raw-ohlcv
          path: data/raw/
      - name: Process Features
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          python src/core/feature_engineering.py
      - name: Upload Processed Data
        uses: actions/upload-artifact@v4
        with:
          name: processed-features
          path: data/processed/
          retention-days: 1

  generate-signals:
    needs: feature-engineering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Dependencies
        run: pip install pandas pyyaml pyarrow tenacity ccxt requests
      - name: Download Processed Data
        uses: actions/download-artifact@v4
        with:
          name: processed-features
          path: data/processed/
      - name: Run Signal Engine
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          python src/core/signal_generator.py
      - name: Upload Signals
        uses: actions/upload-artifact@v4
        with:
          name: aegis-signals
          path: signals/
          if-no-files-found: warn
          retention-days: 7

  discord-alert:
    needs: generate-signals
    runs-on: ubuntu-latest
    # REMOVED: The 'if' condition is gone so this job ALWAYS runs
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Dependencies
        run: pip install requests pyyaml
      - name: Download Signals
        uses: actions/download-artifact@v4
        with:
          name: aegis-signals
          path: signals/
          continue-on-error: true # Continue even if no signals were uploaded

      - name: Send Discord Alert
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python << 'PYEOF'
          import os
          import sys
          import glob
          import json
          import requests
          import yaml
          from datetime import datetime
          
          webhook_url = os.getenv('DISCORD_WEBHOOK')
          if not webhook_url:
              print("❌ DISCORD_WEBHOOK secret missing")
              sys.exit(1)
          
          # Initialize default state
          signals = []
          latest_file = None
          
          # Try to find signal files
          signal_files = glob.glob('signals/*.yaml') + glob.glob('signals/*.json')
          if signal_files:
              latest_file = max(signal_files, key=os.path.getctime)
              with open(latest_file, 'r') as f:
                  data = yaml.safe_load(f) if latest_file.endswith(('.yaml', '.yml')) else json.load(f)
                  signals = data.get('signals', [])

          embeds = []
          if not signals:
              # "No Signal" fallback message
              content = "🛡️ **AEGIS System Update**"
              embeds.append({
                  "title": "Market Monitoring Active",
                  "description": "AEGIS is still forging profits trade for you",
                  "color": 0x7000FF,  # Electric Purple
                  "fields": [
                      {"name": "Status", "value": "🔍 Scanning for Institutional Setups", "inline": True},
                      {"name": "Confidence", "value": "Waiting for High Probability", "inline": True}
                  ],
                  "timestamp": datetime.utcnow().isoformat(),
                  "footer": {"text": "AEGIS Intelligence Suite"}
              })
          else:
              # Standard Signal message
              content = f"📡 **AEGIS Alpha Alert** — {len(signals)} Signals Detected"
              colors = {'buy': 0x00FFA3, 'sell': 0xFF0055, 'hold': 0x7000FF}
              
              for sig in signals[:5]:
                  stype = sig.get('signal_type', 'hold').lower()
                  embeds.append({
                      "title": f"🚀 {sig.get('symbol')} {stype.upper()} SIGNAL",
                      "color": colors.get(stype, 0x808080),
                      "fields": [
                          {"name": "🎯 Entry", "value": f"`${sig.get('entry_price', 0):,.4f}`", "inline": True},
                          {"name": "🛑 Stop Loss", "value": f"`${sig.get('stop_loss', 0):,.4f}`", "inline": True},
                          {"name": "📊 Confidence", "value": f"{sig.get('confidence', 0):.1%}", "inline": True}
                      ],
                      "timestamp": datetime.utcnow().isoformat(),
                      "footer": {"text": "AEGIS Intelligence Suite"}
                  })

          payload = {"content": content, "embeds": embeds}
          requests.post(webhook_url, json=payload, timeout=10).raise_for_status()
          print("✅ Discord notification sent.")
          PYEOF

  pipeline-summary:
    needs: [discord-alert]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: echo "AEGIS Cycle Complete."
