name: AEGIS Alpha Signal Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Dependencies
        run: pip install pandas ccxt pyyaml pyarrow tenacity requests
      - name: Run Data Fetcher
        run: |
          mkdir -p data/raw
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          python src/core/data_fetcher.py
      - name: Upload Raw Data
        uses: actions/upload-artifact@v4
        with:
          name: raw-ohlcv
          path: data/raw/
          if-no-files-found: error # FAIL HERE if data-fetcher didn't work
          retention-days: 1

  feature-engineering:
    needs: fetch-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Dependencies
        run: pip install pandas numpy pyyaml pyarrow pandas-ta tenacity ccxt requests
      - name: Download Raw Data
        uses: actions/download-artifact@v4
        with:
          name: raw-ohlcv
          path: data/raw/
      - name: Process Features
        run: |
          mkdir -p data/processed
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          python src/core/feature_engineering.py
      - name: Upload Processed Data
        uses: actions/upload-artifact@v4
        with:
          name: processed-features
          path: data/processed/
          if-no-files-found: error # FAIL HERE if feature-engineering didn't work
          retention-days: 1

  generate-signals:
    needs: feature-engineering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Dependencies
        run: pip install pandas pyyaml pyarrow tenacity ccxt requests
      - name: Download Processed Data
        uses: actions/download-artifact@v4
        with:
          name: processed-features
          path: data/processed/
      - name: Run Signal Engine
        run: |
          mkdir -p signals
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          python src/core/signal_generator.py
      - name: Upload Signals
        uses: actions/upload-artifact@v4
        with:
          name: aegis-signals
          path: signals/
          if-no-files-found: warn # Don't crash here, we want the alert to run even with no signals
          retention-days: 7

  discord-alert:
    needs: generate-signals
    runs-on: ubuntu-latest
    if: always() # Run even if previous jobs failed (so you get the "forging profits" message)
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Dependencies
        run: pip install requests pyyaml
      
      # Try to download signals, but continue if they don't exist
      - name: Download Signals
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: aegis-signals
          path: signals/

      - name: Send Discord Alert
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python << 'PYEOF'
          import os
          import sys
          import glob
          import json
          import requests
          import yaml
          from datetime import datetime
          
          webhook_url = os.getenv('DISCORD_WEBHOOK')
          if not webhook_url:
              print("⚠️ Webhook missing")
              sys.exit(0)
          
          signals = []
          signal_files = glob.glob('signals/*.yaml') + glob.glob('signals/*.json')
          if signal_files:
              latest_file = max(signal_files, key=os.path.getctime)
              with open(latest_file, 'r') as f:
                  data = yaml.safe_load(f) if latest_file.endswith(('.yaml', '.yml')) else json.load(f)
                  signals = data.get('signals', [])

          if not signals:
              content = "🛡️ **AEGIS System Update**"
              embeds = [{
                  "title": "Market Monitoring Active",
                  "description": "AEGIS is still forging profits trade for you",
                  "color": 0x7000FF,
                  "timestamp": datetime.utcnow().isoformat()
              }]
          else:
              content = f"📡 **AEGIS Alpha Alert** — {len(signals)} Signals Found"
              embeds = []
              # (rest of signal logic)
              for sig in signals[:3]:
                  embeds.append({"title": f"🚀 {sig.get('symbol')} Signal", "color": 0x00FFA3})

          requests.post(webhook_url, json={"content": content, "embeds": embeds})
          PYEOF
