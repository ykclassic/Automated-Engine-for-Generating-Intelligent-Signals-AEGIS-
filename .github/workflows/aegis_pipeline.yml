name: AEGIS Pipeline

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes (GitHub minimum)
  workflow_dispatch:  # Manual trigger

env:
  PYTHON_VERSION: '3.11'
  CONFIG_PATH: 'config/settings.yaml'
  DATA_DIR: 'data'
  CACHE_KEY_PREFIX: 'aegis-data'

jobs:
  # Job 1: Fetch market data from exchanges
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 4  # Prevent hanging, must complete before next 5-min cycle
    
    outputs:
      data_fetched: ${{ steps.fetch.outputs.data_fetched }}
      exchanges_used: ${{ steps.fetch.outputs.exchanges_used }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: ${{ env.DATA_DIR }}
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-
      
      - name: Fetch market data
        id: fetch
        env:
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: |
          python << 'PYEOF'
          import sys
          import os
          sys.path.insert(0, 'src')
          
          from core.data_fetcher import update_all_data
          import json
          
          try:
              # Fetch data for all configured assets/timeframes
              results = update_all_data(config_path=os.environ.get('CONFIG_PATH', 'config/settings.yaml'))
              
              # Count successes
              successful = sum(1 for r in results.values() if r.success)
              total = len(results)
              
              # Get unique exchanges used
              exchanges = list(set(r.exchange for r in results.values() if r.success))
              
              # Set outputs for downstream jobs
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"data_fetched={successful > 0}\n")
                  f.write(f"exchanges_used={json.dumps(exchanges)}\n")
                  f.write(f"fetch_summary={successful}/{total} assets fetched\n")
              
              # Exit with error if no data fetched
              if successful == 0:
                  print("❌ No data fetched successfully")
                  sys.exit(1)
                  
              print(f"✅ Fetched data for {successful}/{total} assets")
              
          except Exception as e:
              print(f"❌ Fetch failed: {e}")
              import traceback
              traceback.print_exc()
              sys.exit(1)
          PYEOF

      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-data
          path: ${{ env.DATA_DIR }}/raw/
          retention-days: 1

  # Job 2: Calculate technical indicators (runs after fetch-data)
  calculate-indicators:
    runs-on: ubuntu-latest
    needs: fetch-data
    if: needs.fetch-data.outputs.data_fetched == 'true'
    timeout-minutes: 3
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Download data artifact
        uses: actions/download-artifact@v4
        with:
          name: market-data
          path: ${{ env.DATA_DIR }}/raw/
      
      - name: Calculate indicators
        run: |
          python << 'PYEOF'
          import sys
          import os
          sys.path.insert(0, 'src')
          
          from core.feature_engineering import calculate_all_indicators
          
          try:
              calculate_all_indicators(
                  input_dir='data/raw',
                  output_dir='data/processed'
              )
              print("✅ Indicators calculated successfully")
          except Exception as e:
              print(f"❌ Indicator calculation failed: {e}")
              import traceback
              traceback.print_exc()
              sys.exit(1)
          PYEOF

      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: ${{ env.DATA_DIR }}/processed/
          retention-days: 1

  # Job 3: Generate trading signals (runs after calculate-indicators)
  generate-signals:
    runs-on: ubuntu-latest
    needs: calculate-indicators
    timeout-minutes: 3
    
    outputs:
      signals_generated: ${{ steps.signals.outputs.signals_generated }}
      signal_count: ${{ steps.signals.outputs.signal_count }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: ${{ env.DATA_DIR }}/processed/
      
      - name: Generate signals
        id: signals
        run: |
          python << 'PYEOF'
          import sys
          import os
          sys.path.insert(0, 'src')
          
          from core.signal_generator import SignalGenerator
          from core.data_loader import load_all_assets
          import json
          
          try:
              # Load processed data
              data = load_all_assets('data/processed')
              
              # Initialize generator with risk level from config or default
              risk_level = os.environ.get('RISK_LEVEL', 'medium')
              generator = SignalGenerator(
                  config_path='config/settings.yaml',
                  risk_level=risk_level
              )
              
              # Generate signals
              signals = generator.generate_signals(data)
              filtered_signals = generator.filter_signals(signals, max_signals=10)
              
              # Save signals
              generator.save_signals(filtered_signals, output_dir='data/signals')
              
              # Set outputs
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"signals_generated={len(filtered_signals) > 0}\n")
                  f.write(f"signal_count={len(filtered_signals)}\n")
              
              print(f"✅ Generated {len(filtered_signals)} signals")
              
          except Exception as e:
              print(f"❌ Signal generation failed: {e}")
              import traceback
              traceback.print_exc()
              # Don't fail the workflow if no signals generated
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("signals_generated=false\n")
                  f.write("signal_count=0\n")
          PYEOF

      - name: Upload signals
        uses: actions/upload-artifact@v4
        with:
          name: trading-signals
          path: ${{ env.DATA_DIR }}/signals/
          retention-days: 7

  # Job 4: Send notifications (runs in parallel with signal generation, after fetch)
  notify:
    runs-on: ubuntu-latest
    needs: [fetch-data, generate-signals]
    if: always() && needs.fetch-data.outputs.data_fetched == 'true'
    timeout-minutes: 2
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download signals
        uses: actions/download-artifact@v4
        with:
          name: trading-signals
          path: ${{ env.DATA_DIR }}/signals/
        continue-on-error: true
      
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python << 'PYEOF'
          import os
          import json
          import glob
          from datetime import datetime
          
          if not os.environ.get('DISCORD_WEBHOOK'):
              print("ℹ️ No Discord webhook configured")
              exit(0)
          
          try:
              import requests
              
              # Find latest signals file
              signal_files = glob.glob('data/signals/signals_*.yaml')
              
              if signal_files:
                  # Read latest signals
                  import yaml
                  with open(max(signal_files, key=os.path.getctime), 'r') as f:
                      data = yaml.safe_load(f)
                      signals = data.get('signals', [])
                  
                  # Format message
                  if signals:
                      embeds = []
                      for sig in signals[:5]:  # Top 5 signals
                          color = 0x00ff00 if sig['signal_type'] == 'buy' else 0xff0000
                          embeds.append({
                              "title": f"{sig['symbol']} {sig['signal_type'].upper()}",
                              "description": f"Confidence: {sig['confidence']:.2f}\nEntry: {sig['entry_price']:.4f}\nStop: {sig['stop_loss']:.4f}\nTarget: {sig['take_profit']:.4f}",
                              "color": color,
                              "timestamp": sig['timestamp']
                          })
                      
                      message = {
                          "content": f"🚀 AEGIS Signals - {datetime.now().strftime('%Y-%m-%d %H:%M UTC')}",
                          "embeds": embeds
                      }
                  else:
                      message = {
                          "content": f"📊 AEGIS Update - {datetime.now().strftime('%Y-%m-%d %H:%M UTC')}\nNo high-confidence signals at this time."
                      }
              else:
                  message = {
                      "content": f"✅ AEGIS Pipeline Complete - {datetime.now().strftime('%Y-%m-%d %H:%M UTC')}\nData updated, no signals generated."
                  }
              
              # Send webhook
              response = requests.post(
                  os.environ['DISCORD_WEBHOOK'],
                  json=message,
                  headers={'Content-Type': 'application/json'},
                  timeout=10
              )
              response.raise_for_status()
              print("✅ Discord notification sent")
              
          except Exception as e:
              print(f"⚠️ Notification failed: {e}")
              # Don't fail the workflow if notification fails
          PYEOF

  # Job 5: Cleanup (runs last, always)
  cleanup:
    runs-on: ubuntu-latest
    needs: [fetch-data, calculate-indicators, generate-signals, notify]
    if: always()
    timeout-minutes: 1
    
    steps:
      - name: Cleanup old artifacts
        uses: geekyeggo/delete-artifact@v4
        with:
          name: |
            market-data
            processed-data
          failOnError: false
        continue-on-error: true
      
      - name: Log pipeline status
        run: |
          echo "Pipeline completed at $(date -u)"
          echo "Fetch status: ${{ needs.fetch-data.result }}"
          echo "Indicator status: ${{ needs.calculate-indicators.result }}"
          echo "Signal status: ${{ needs.generate-signals.result }}"
          echo "Notify status: ${{ needs.notify.result }}"
