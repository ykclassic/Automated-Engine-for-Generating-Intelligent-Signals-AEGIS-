name: AEGIS Alpha Signal Pipeline

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:      # Allow manual runs

env:
  PYTHON_VERSION: '3.12'
  # Ensure this secret is named exactly DISCORD_WEBHOOK in your GitHub Repo Settings
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas ccxt pyyaml pyarrow tenacity requests

      - name: Run Data Fetcher
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          python src/core/data_fetcher.py

      - name: Upload Raw Data
        uses: actions/upload-artifact@v4
        with:
          name: raw-ohlcv
          path: data/raw/
          retention-days: 1

  feature-engineering:
    needs: fetch-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyyaml pyarrow pandas-ta tenacity ccxt requests

      - name: Download Raw Data
        uses: actions/download-artifact@v4
        with:
          name: raw-ohlcv
          path: data/raw/

      - name: Process Features
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          python << 'PYEOF'
          import sys
          import os
          from pathlib import Path
          import pandas as pd
          
          sys.path.insert(0, os.getcwd())
          from src.core.feature_engineering import FeatureEngineer
          
          engineer = FeatureEngineer()
          raw_dir = Path("data/raw")
          proc_dir = Path("data/processed")
          proc_dir.mkdir(parents=True, exist_ok=True)
          
          raw_files = list(raw_dir.glob("*.parquet"))
          if not raw_files:
              print("⚠️ No raw data files found to process.")
              sys.exit(0)

          for file in raw_files:
              print(f"Engineering: {file.name}")
              df = pd.read_parquet(file)
              processed_df = engineer.calculate_all_features(df)
              processed_df.to_parquet(proc_dir / file.name)
          PYEOF

      - name: Upload Processed Data
        uses: actions/upload-artifact@v4
        with:
          name: processed-features
          path: data/processed/
          retention-days: 1

  generate-signals:
    needs: feature-engineering
    runs-on: ubuntu-latest
    outputs:
      signals_generated: ${{ steps.signal-check.outputs.signals_generated }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyyaml pyarrow tenacity ccxt requests

      - name: Download Processed Data
        uses: actions/download-artifact@v4
        with:
          name: processed-features
          path: data/processed/

      - name: Run Signal Engine
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          python src/core/signal_generator.py

      - name: Check for Signals
        id: signal-check
        run: |
          python << 'PYEOF'
          import os
          import glob
          import yaml
          
          # Create directory if it doesn't exist to avoid glob errors
          os.makedirs("signals", exist_ok=True)
          signal_files = glob.glob("signals/*.yaml") + glob.glob("signals/*.json")
          
          found = "false"
          if signal_files:
              latest_file = max(signal_files, key=os.path.getctime)
              with open(latest_file, 'r') as f:
                  data = yaml.safe_load(f) if latest_file.endswith(('.yaml', '.yml')) else json.load(f)
                  signals = data.get('signals', [])
                  if len(signals) > 0:
                      found = "true"
                      print(f"✅ Found {len(signals)} signals in {latest_file}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"signals_generated={found}\n")
          PYEOF

      - name: Upload Signals
        if: steps.signal-check.outputs.signals_generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: aegis-signals
          path: signals/
          retention-days: 7

  discord-alert:
    needs: generate-signals
    runs-on: ubuntu-latest
    # This condition ensures the job only runs if signals were actually found
    if: needs.generate-signals.outputs.signals_generated == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: pip install requests pyyaml

      - name: Download Signals
        uses: actions/download-artifact@v4
        with:
          name: aegis-signals
          path: signals/

      - name: Send Discord Alert
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python << 'PYEOF'
          import os
          import sys
          import glob
          import json
          import requests
          import yaml
          from datetime import datetime
          
          webhook_url = os.getenv('DISCORD_WEBHOOK')
          if not webhook_url:
              print("❌ ERROR: DISCORD_WEBHOOK secret is empty or not found.")
              sys.exit(1)
          
          signal_files = glob.glob('signals/*.yaml') + glob.glob('signals/*.json')
          if not signal_files:
              print("❌ ERROR: Artifact downloaded but no signal files found in directory.")
              sys.exit(1)
          
          latest_file = max(signal_files, key=os.path.getctime)
          print(f"📡 Processing alerts from: {latest_file}")
          
          with open(latest_file, 'r') as f:
              data = yaml.safe_load(f) if latest_file.endswith(('.yaml', '.yml')) else json.load(f)
          
          signals = data.get('signals', [])
          if not signals:
              print("ℹ️ Signal file was empty.")
              sys.exit(0)
          
          embeds = []
          colors = {'buy': 0x00FFA3, 'sell': 0xFF0055, 'hold': 0x7000FF}
          
          # Process top 5 signals
          for signal in signals[:5]:
              sig_type = signal.get('signal_type', 'hold').lower()
              symbol = signal.get('symbol', 'Unknown')
              
              fields = [
                  {"name": "🎯 Entry", "value": f"`${signal.get('entry_price', 0):,.4f}`", "inline": True},
                  {"name": "🛑 Stop Loss", "value": f"`${signal.get('stop_loss', 0):,.4f}`", "inline": True},
                  {"name": "🎯 Take Profit", "value": f"`${signal.get('take_profit', 0):,.4f}`", "inline": True},
                  {"name": "📊 Confidence", "value": f"{signal.get('confidence', 0):.1%}", "inline": True},
                  {"name": "⚖️ R/R Ratio", "value": f"`{signal.get('risk_reward_ratio', 0)}:1`", "inline": True},
                  {"name": "⏰ Timeframe", "value": f"`{signal.get('timeframe', '1h')}`", "inline": True}
              ]
              
              embeds.append({
                  "title": f"🚀 {symbol} {sig_type.upper()} SIGNAL",
                  "color": colors.get(sig_type, 0x808080),
                  "fields": fields,
                  "timestamp": datetime.utcnow().isoformat(),
                  "footer": {"text": "AEGIS Intelligence Suite"}
              })
          
          payload = {
              "content": f"📡 **AEGIS Alpha Alert** — {datetime.now().strftime('%Y-%m-%d %H:%M UTC')}",
              "embeds": embeds
          }
          
          resp = requests.post(webhook_url, json=payload, timeout=10)
          resp.raise_for_status()
          print(f"✅ Alert sent successfully.")
          PYEOF

  pipeline-summary:
    needs: [fetch-data, feature-engineering, generate-signals, discord-alert]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Pipeline Summary
        run: |
          echo "========================================"
          echo "🎯 AEGIS Pipeline Status"
          echo "========================================"
          echo "Fetch Data: ${{ needs.fetch-data.result }}"
          echo "Feature Engineering: ${{ needs.feature-engineering.result }}"
          echo "Signal Generation: ${{ needs.generate-signals.result }}"
          echo "Discord Alert: ${{ needs.discord-alert.result }}"
          echo "========================================"
