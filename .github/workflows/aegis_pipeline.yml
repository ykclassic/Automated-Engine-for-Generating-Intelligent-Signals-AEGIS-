name: AEGIS Production Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trade_engine:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          pip install pandas numpy scipy pyyaml pyarrow structlog
          mkdir -p data/processed data/raw
          touch src/__init__.py src/core/__init__.py src/indicators/__init__.py

      - name: Download Market Data
        uses: actions/download-artifact@v4
        with:
          name: market-data
          path: data/raw
        continue-on-error: true

      - name: Execute AEGIS Logic
        run: |
          python << 'PYEOF'
          import json
          import pandas as pd
          from pathlib import Path
          from src.core.signal_generator import SignalGenerator

          # Now initializing with the correct keyword argument
          gen = SignalGenerator(min_confidence=0.65, risk_level='moderate')
          all_signals = []
          
          files = list(Path("data/raw").glob("*.parquet"))
          print(f"--- Processing {len(files)} Assets ---")
          
          for f in files:
              try:
                  df = pd.read_parquet(f)
                  symbol = f.stem.split('_')[0] + "/USDT"
                  signals = gen.generate_signals(df, symbol, account_balance=5000.0)
                  all_signals.extend(signals)
                  if signals:
                      print(f"🎯 {symbol} {signals[0]['direction']} generated.")
              except Exception as e:
                  print(f"❌ Error on {f.name}: {e}")

          with open("data/processed/latest_signals.json", "w") as out:
              json.dump(all_signals, out, indent=2)
          PYEOF

      - name: Upload for Streamlit
        uses: actions/upload-artifact@v4
        with:
          name: aegis-signals
          path: data/processed/latest_signals.json
