name: AEGIS Alpha Signal Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Dependencies
        run: pip install pandas ccxt pyyaml pyarrow tenacity requests zstandard
      - name: Run Data Fetcher
        run: |
          mkdir -p data/raw
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          python src/core/data_fetcher.py # This now calls update_all_data()
      - name: Upload Raw Data
        uses: actions/upload-artifact@v4
        with:
          name: raw-ohlcv
          path: data/raw/
          if-no-files-found: error

  feature-engineering:
    needs: fetch-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Dependencies
        run: pip install pandas numpy pyyaml pyarrow pandas-ta tenacity ccxt==4.2.25 requests zstandard
      - name: Download Raw Data
        uses: actions/download-artifact@v4
        with:
          name: raw-ohlcv
          path: data/raw/
      - name: Run Feature Engineering
        run: |
          mkdir -p data/processed
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          # We use a custom runner block to bridge your class and the workflow
          python << 'PYEOF'
          import os, sys
          from pathlib import Path
          import pandas as pd
          from src.core.feature_engineering import FeatureEngineer
          
          engineer = FeatureEngineer()
          raw_dir = Path("data/raw")
          proc_dir = Path("data/processed")
          
          for file in raw_dir.glob("*.parquet"):
              print(f"Engineering: {file.name}")
              df = pd.read_parquet(file)
              processed_df = engineer.calculate_all_features(df)
              processed_df.to_parquet(proc_dir / file.name)
          PYEOF
      - name: Upload Processed Data
        uses: actions/upload-artifact@v4
        with:
          name: processed-features
          path: data/processed/
          if-no-files-found: error

  generate-signals:
    needs: feature-engineering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Dependencies
        run: pip install pandas pyyaml pyarrow tenacity ccxt requests zstandard
      - name: Download Processed Data
        uses: actions/download-artifact@v4
        with:
          name: processed-features
          path: data/processed/
      - name: Run Signal Engine
        run: |
          mkdir -p signals
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          python src/core/signal_generator.py # Calls process_all_signals()
      - name: Upload Signals
        uses: actions/upload-artifact@v4
        with:
          name: aegis-signals
          path: signals/
          if-no-files-found: warn

  discord-alert:
    needs: generate-signals
    runs-on: ubuntu-latest
    if: always() # IMPORTANT: Always run this
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Dependencies
        run: pip install requests pyyaml
      - name: Download Signals
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: aegis-signals
          path: signals/
      - name: Send Alert
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python << 'PYEOF'
          import os, glob, json, requests, yaml
          from datetime import datetime
          
          webhook_url = os.getenv('DISCORD_WEBHOOK')
          signal_files = glob.glob('signals/*.json')
          signals = []
          
          if signal_files:
              with open(max(signal_files, key=os.path.getctime), 'r') as f:
                  signals = json.load(f)

          if not signals:
              content = "🛡️ **AEGIS System Update**"
              embeds = [{"title": "Monitoring Mode", "description": "AEGIS is still forging profits trade for you", "color": 0x7000FF}]
          else:
              content = "🚀 **AEGIS Signal Detected**"
              embeds = []
              for s in signals[:3]:
                  embeds.append({
                      "title": f"{s['symbol']} {s['direction']}",
                      "description": f"Entry: ${s['entry_price']}\nConfidence: {s['confidence']:.0%}",
                      "color": 0x00FFA3
                  })

          requests.post(webhook_url, json={"content": content, "embeds": embeds})
          PYEOF
