name: AEGIS Alpha Signal Pipeline

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:      # Allow manual runs

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Fetcher Deps
        run: pip install pandas ccxt pyyaml pyarrow
      - name: Run Fetcher
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python src/core/data_fetcher.py
      - name: Upload Raw Data
        uses: actions/upload-artifact@v4
        with:
          name: raw-ohlcv
          path: data/raw/

  feature-engineering:
    needs: fetch-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Feature Deps
        run: pip install pandas numpy pyyaml pyarrow pandas_ta
      - name: Download Raw Data
        uses: actions/download-artifact@v4
        with:
          name: raw-ohlcv
          path: data/raw/
      - name: Process Features
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python << 'PYEOF'
          import pandas as pd
          from pathlib import Path
          from src.core.feature_engineering import FeatureEngineer
          
          engineer = FeatureEngineer()
          raw_dir = Path("data/raw")
          proc_dir = Path("data/processed")
          proc_dir.mkdir(parents=True, exist_ok=True)
          
          for file in raw_dir.glob("*.parquet"):
              df = pd.read_parquet(file)
              processed_df = engineer.calculate_all_features(df)
              processed_df.to_parquet(proc_dir / file.name)
              print(f"Processed {file.name}")
          PYEOF
      - name: Upload Processed Data
        uses: actions/upload-artifact@v4
        with:
          name: processed-features
          path: data/processed/

  generate-signals:
    needs: feature-engineering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Signal Deps
        run: pip install pandas pyyaml pyarrow
      - name: Download Processed Data
        uses: actions/download-artifact@v4
        with:
          name: processed-features
          path: data/processed/
      - name: Run Signal Engine
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python src/core/signal_generator.py
      - name: Upload Signals
        uses: actions/upload-artifact@v4
        with:
          name: aegis-signals
          path: signals/
