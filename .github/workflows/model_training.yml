name: AEGIS Model Training

on:
  schedule:
    - cron: '0 0 * * 0' # Retrain weekly on Sundays
  workflow_dispatch:
    inputs:
      optimize_hyperparams:
        description: 'Optimize hyperparameters'
        required: false
        default: 'false'

jobs:
  train-models:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy ccxt pyyaml joblib lightgbm xgboost scikit-learn requests pyarrow
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Download Historical Data (All 10 Pairs)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python << 'PYEOF'
          import os, yaml, sys
          from src.core.data_fetcher import DataFetcher, ExchangeManager
          
          manager = ExchangeManager()
          fetcher = DataFetcher(manager, data_dir="data")
          
          with open('config/assets.yaml', 'r') as f:
              assets_cfg = yaml.safe_load(f)
          
          # Iterate through ALL categories: majors, large_cap, mid_cap
          for category in ['majors', 'large_cap', 'mid_cap']:
              targets = assets_cfg['assets'].get(category, [])
              for asset in targets:
                  symbol = asset['symbol']
                  print(f"📥 Deep Fetching {symbol} (5000 periods)...")
                  try:
                      fetcher.fetch_ohlcv(symbol, timeframe='1h', limit=5000)
                  except Exception as e:
                      print(f"⚠️ Failed to fetch {symbol}: {e}")
          PYEOF

      - name: Execute Multi-Asset ML Training
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python << 'PYEOF'
          import os, sys, json, pandas as pd
          from pathlib import Path
          from src.ml.train import TrainingPipeline
          
          raw_dir = Path("data/raw")
          all_dfs = []
          
          for file in raw_dir.glob("*.parquet"):
              df = pd.read_parquet(file)
              # Add symbol column from filename for the model to differentiate
              df['symbol'] = file.stem.split('_')[0]
              all_dfs.append(df)
          
          if not all_dfs:
              print("❌ No data found."); sys.exit(1)
              
          combined = pd.concat(all_dfs).sort_index()
          print(f"✅ Training on Pooled Dataset: {len(combined)} total samples across 10 pairs.")

          trainer = TrainingPipeline()
          results = trainer.run_full_training(combined, model_types=['lightgbm', 'xgboost', 'ensemble'])
          
          os.makedirs('data/processed', exist_ok=True)
          with open('data/processed/training_results.json', 'w') as f:
              json.dump(results, f, indent=2, default=str)
          PYEOF

      - name: Commit to data-storage
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git fetch origin data-storage || true
          git checkout data-storage 2>/dev/null || git checkout -b data-storage
          mkdir -p models
          cp data/models/* models/ 2>/dev/null || true
          git add models/
          git commit -m "🤖 Global Intelligence Update: $(date -u +'%Y-%m-%d')" || echo "No changes"
          git push origin data-storage

      - name: Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO_URL: "https://github.com/${{ github.repository }}/tree/data-storage/models"
        run: |
          python << 'PYEOF'
          import json, os, requests
          from datetime import datetime
          
          with open('data/processed/training_results.json') as f:
              results = json.load(f)

          fields = []
          for model, res in results.items():
              if res.get('status') == 'success':
                  m = res.get('metrics', {})
                  fields.append({'name': f"✅ {model.upper()}", 'value': f"F1: `{m.get('f1_macro', 0):.3f}`", 'inline': True})
          
          embed = {
              'title': '🤖 AEGIS Global Brain Retrained',
              'description': f"Trained on 10 pairs. [Download Models]({os.getenv('REPO_URL')})",
              'color': 0x00FFA3,
              'fields': fields,
              'timestamp': datetime.utcnow().isoformat()
          }
          requests.post(os.getenv('DISCORD_WEBHOOK'), json={'embeds': [embed]})
          PYEOF
